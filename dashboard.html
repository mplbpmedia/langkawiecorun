<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Langkawi Eco Run 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap');
        body { font-family: 'Oswald', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-950 p-6 flex justify-between items-center text-white">
        <h1 class="text-xl uppercase tracking-widest font-bold">Participant Dashboard</h1>
        <button onclick="logout()" class="text-orange-500 hover:text-white transition">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </nav>

    <div class="max-w-4xl mx-auto p-6 mt-6">
        <div class="bg-white rounded-2xl p-8 shadow-lg border-l-8 border-orange-600 mb-6">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-2xl text-blue-950 uppercase font-bold">Hi, <span id="user-name">...</span>!</h2>
                    <p class="text-gray-500">Welcome to your dashboard</p>
                </div>
                <div class="text-right">
                    <span id="reg-status" class="px-4 py-2 bg-yellow-100 text-yellow-800 font-bold uppercase text-sm rounded-full">Pending Verification</span>
                </div>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-md">
                <h3 class="text-blue-950 font-bold uppercase mb-4 border-b pb-2">Registration Details</h3>
                <p class="text-gray-600">Category: <span id="user-cat" class="text-blue-950 font-bold">---</span></p>
                <p class="text-gray-600">BIB Number: <span id="user-bib" class="text-orange-600 font-bold">Pending...</span></p>
            </div>
            
            <div class="bg-blue-950 p-6 rounded-2xl shadow-md text-white">
                <h3 class="font-bold uppercase mb-4 border-b border-blue-800 pb-2">Action Center</h3>
                <button class="w-full bg-orange-600 hover:bg-orange-500 py-3 rounded-lg uppercase font-bold transition">
                    Download E-Receipt
                </button>
            </div>
        </div>
    </div>

<script>
    async function loadProfile() {
        const sessionId = localStorage.getItem("sessionId"); // Ambil sessionId
        if (!sessionId) { window.location.href = "login.html"; return; }

        try {
            const response = await fetch("https://langkawi-eco-api.mplbp-media.workers.dev/api/user/profile", {
                headers: { "Authorization": "Bearer " + sessionId } // Hantar sebagai Bearer token
            });
            
            const data = await response.json();
            
            if(response.ok) {
                // Update UI kau seperti biasa
                document.getElementById('user-name').innerText = data.full_name; // Pastikan nama column sama dengan DB
                document.getElementById('user-cat').innerText = data.category;
                document.getElementById('user-bib').innerText = data.bib_number || "PENDING";
                
                const statusEl = document.getElementById('reg-status');
                if(data.status === 'verified') {
                    statusEl.innerText = "Confirmed";
                    statusEl.className = "px-4 py-2 bg-green-100 text-green-800 font-bold uppercase text-sm rounded-full";
                }
            } else {
                alert("Session expired. Please login again.");
                window.location.href = "login.html";
            }
        } catch (err) {
            console.error("Error:", err);
        }
    }

    loadProfile();

    // Fungsi Logout (PENTING: supaya sesi dalam DB dipadam/diabaikan)
    function logout() {
        localStorage.removeItem("sessionId");
        window.location.href = "index.html";
    }
</script>
</body>
</html>
