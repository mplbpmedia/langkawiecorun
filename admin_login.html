<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | LER 2.0 Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #172554 0%, #1e3a8a 50%, #172554 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Animated background pattern */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(234, 88, 12, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(234, 88, 12, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 10;
            border-top: 4px solid #ea580c;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-header h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            font-style: italic;
            color: #172554;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .brand-header h1 span {
            color: #ea580c;
        }

        .brand-header p {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #64748b;
            margin-top: 0.5rem;
        }

        .admin-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, #fef3c7, #fed7aa);
            border: 1px solid #fbbf24;
            border-radius: 999px;
            padding: 0.4rem 1rem;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #92400e;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #172554;
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: #ea580c;
            background: white;
            box-shadow: 0 0 0 3px rgba(234, 88, 12, 0.1);
        }

        .btn-login {
            width: 100%;
            background: #172554;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-login:hover:not(:disabled) {
            background: #ea580c;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(234, 88, 12, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            color: #64748b;
            font-size: 0.8rem;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #ea580c;
        }

        .security-note {
            margin-top: 2rem;
            padding: 1rem;
            background: #fef3c7;
            border: 1px solid #fde68a;
            border-radius: 12px;
            font-size: 0.7rem;
            color: #92400e;
            text-align: center;
            line-height: 1.5;
        }

        .security-note i {
            margin-right: 0.5rem;
        }

        /* Loading spinner */
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <!-- Brand Header -->
        <div class="brand-header">
            <h1>LER <span>2.0</span></h1>
            <p>Admin Command Center</p>
        </div>

        <!-- Admin Badge -->
        <div class="text-center">
            <div class="admin-badge">
                <i class="fas fa-shield-alt"></i>
                Authorized Personnel Only
            </div>
        </div>

        <!-- Login Form -->
        <form id="adminLoginForm">
            <div class="form-group">
                <label class="form-label" for="admin-username">
                    <i class="fas fa-user" style="margin-right: 0.5rem; color: #ea580c;"></i>
                    Username
                </label>
                <input 
                    type="text" 
                    id="admin-username" 
                    class="form-input" 
                    placeholder="Enter your username"
                    required
                    autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="admin-password">
                    <i class="fas fa-lock" style="margin-right: 0.5rem; color: #ea580c;"></i>
                    Password
                </label>
                <input 
                    type="password" 
                    id="admin-password" 
                    class="form-input" 
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" id="btn-admin-login" class="btn-login">
                <i class="fas fa-sign-in-alt"></i>
                Access Admin Panel
            </button>
        </form>

        <!-- Back Link -->
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Back to Main Site
        </a>

        <!-- Security Note -->
        <div class="security-note">
            <i class="fas fa-exclamation-triangle"></i>
            <strong>Security Notice:</strong> Unauthorized access attempts are logged and monitored.
        </div>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btn-admin-login');
            const username = document.getElementById('admin-username').value;
            const password = document.getElementById('admin-password').value;

            // Show loading state
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Authenticating...';

            try {
                const response = await fetch("https://langkawi-eco-api.mplbp-media.workers.dev/api/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    // Store admin session
                    localStorage.setItem("adminSession", result.adminSession);
                    localStorage.setItem("adminRole", result.adminRole);
                    
                    // Show success message
                    btn.innerHTML = '<i class="fas fa-check"></i> Access Granted!';
                    btn.style.background = '#16a34a';
                    
                    // Redirect after short delay
                    setTimeout(() => {
                        window.location.href = "dashboard_admin.html";
                    }, 800);
                } else {
                    // Show error
                    alert("❌ " + (result.error || "Login failed"));
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Admin Panel';
                    btn.disabled = false;
                    btn.style.background = '#172554';
                }
            } catch (err) {
                alert("❌ Ralat server: " + err.message);
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Admin Panel';
                btn.disabled = false;
                btn.style.background = '#172554';
            }
        });

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const adminSession = localStorage.getItem("adminSession");
            if (adminSession) {
                // Verify session is still valid
                fetch("https://langkawi-eco-api.mplbp-media.workers.dev/api/admin/verify", {
                    method: "GET",
                    headers: { "Authorization": adminSession }
                })
                .then(res => res.json())
                .then(data => {
                    if (data.valid) {
                        // Already logged in, redirect to dashboard
                        window.location.href = "dashboard_admin.html";
                    }
                })
                .catch(() => {
                    // Session invalid, clear and stay on login
                    localStorage.removeItem("adminSession");
                    localStorage.removeItem("adminRole");
                });
            }
        });
    </script>
</body>
</html>
